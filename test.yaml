# Settings from the General section, for all configurations
General:
  ConfigurationType: DynamicLibrary
  UseOfMfc: false

# Compiler settings for all configurations
ClCompile:
  EnableEnhancedInstructionSet: StreamingSIMDExtensions2
  PreprocessorDefinitions: 
  - TRINITYNAME=$(TargetName)
  - TRINITYBUILD
  - BLUE_OVERRIDE_VECTOR_TYPES=1
  - UMBRA_OVERRIDE_VECTOR_TYPES=1
  - _CRT_RAND_S
  - NO_SHLWAPI_ISOS
  # This is to prevent warnings from std::copy
  - _SCL_SECURE_NO_WARNINGS
  PrecompiledHeader: Use
  PrecompiledHeaderFile: stdafx.h
  PrecompiledHeaderOutputFile: $(IntDir)trinity.pch
  WarningLevel: Level3
  TreatWarningAsError: true
  BufferSecurityCheck: false

# Linker settings for all configurations
Link:
  IgnoreAllDefaultLibraries: true
  AdditionalDependencies: 
  - dbghelp.lib
  - oldnames.lib

# Here come the different configurations
Configurations:
  Debug|Win32,x64:
    Imports:
    - trinity_debug.yaml
    - trinity_d3d9.yaml
    - ../blue/Include/uses_blue.yaml
    General:
      TargetName: _$(ProjectName)_d
  Dev9|Win32,x64:
    Imports:
    - trinity_dev.yaml
    - trinity_d3d9.yaml
    - ../blue/Include/uses_blue.yaml
    General:
      TargetName: _$(ProjectName)_dev9
  Dev11|Win32,x64:
    Imports:
    - trinity_dev.yaml
    - trinity_d3d11.yaml
    - ../blue/Include/uses_blue.yaml
    General:
      TargetName: _$(ProjectName)_dev11
  DevGLES2|Win32:
    # Note that we only have a 32bit version here - don't have glew in 64 bit
    Imports:
    - trinity_dev.yaml
    - trinity_gles2.yaml
    - ../blue/Include/uses_blue.yaml
    General:
      TargetName: _$(ProjectName)_devgles2
  Dev9_26|Win32,x64:
    Imports:
    - trinity_dev.yaml
    - trinity_d3d9.yaml
    - ../blue/Include/uses_blue_26.yaml
    General:
      TargetName: _$(ProjectName)_dev9
  Release|Win32,x64:
    Imports:
    - trinity_release.yaml
    - trinity_d3d9.yaml
    - ../blue/Include/uses_blue.yaml
    General:
      TargetName: _$(ProjectName)
  Release11|Win32,x64:
    Imports:
    - trinity_release.yaml
    - trinity_d3d11.yaml
    - ../blue/Include/uses_blue.yaml
    General:
      TargetName: _$(ProjectName)11
  Deploy|Win32,x64:
    Imports:
    - trinity_deploy.yaml
    - trinity_d3d9.yaml
    - ../blue/Include/uses_blue.yaml
    General:
      TargetName: _$(ProjectName)_deploy

